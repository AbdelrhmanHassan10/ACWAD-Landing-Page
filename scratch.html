<!-- ══════════════════════ INTERACTIVE SANDBOX (PLAYGROUND) ══════════════════════ -->
<section class="section-sandbox" id="scratch-sandbox">
    <div class="section-sandbox__header reveal">
        <span class="section-badge section-badge--blue" data-en="PLAYGROUND" data-ar="منطقة اللعب"></span>
        <h2 class="section-title">
            <span data-en="Interactive " data-ar="مُحاكي "></span><span class="text--orange" data-en="Scratch Sandbox" data-ar="سكراتش التفاعلي"></span>
        </h2>
        <p class="sandbox-desc" data-en="Click the blocks below to build a stack, then run the sequence to animate the mascot!" data-ar="اضغط على الأوامر بالأسفل لبناء مجموعة، ثم شغّل التسلسل لتحريك شخصية القط!"></p>
    </div>
    
    <div class="sandbox-container">
        <div class="sandbox-editor">
            <div class="sandbox-editor__header">
                <div class="sandbox-dots">
                    <span class="s-dot s-dot--red"></span>
                    <span class="s-dot s-dot--yellow"></span>
                    <span class="s-dot s-dot--green"></span>
                </div>
                <div class="sandbox-editor__title" data-en="Coding Workspace" data-ar="بيئة العمل البرمجية"></div>
            </div>
            
            <div class="sandbox-editor__body">
                <div class="sandbox-block-palette">
                    <h4 class="sandbox-subtitle" data-en="Blocks Palette (Click to Add)" data-ar="مجموعة الأوامر (اضغط للإضافة)"></h4>
                    <div class="palette-blocks">
                        <button class="scratch-btn scratch-btn--motion" data-action="move" data-en="Move 30 Steps" data-ar="تحرك ٣٠ خطوة">
                            <span class="s-icon">🏃</span>
                            <span data-en="Move 30 Steps" data-ar="تحرك ٣٠ خطوة"></span>
                        </button>
                        <button class="scratch-btn scratch-btn--motion" data-action="turn" data-en="Turn 45 Degrees" data-ar="استدر ٤٥ درجة">
                            <span class="s-icon">🔄</span>
                            <span data-en="Turn 45 Degrees" data-ar="استدر ٤٥ درجة"></span>
                        </button>
                        <button class="scratch-btn scratch-btn--looks" data-action="say" data-en="Say Hello!" data-ar="قل مرحباً!">
                            <span class="s-icon">💬</span>
                            <span data-en="Say Hello!" data-ar="قل مرحباً!"></span>
                        </button>
                        <button class="scratch-btn scratch-btn--sound" data-action="sound" data-en="Play Sound Meow" data-ar="شغل صوت مواء">
                            <span class="s-icon">🔊</span>
                            <span data-en="Play Sound Meow" data-ar="شغل صوت مواء"></span>
                        </button>
                    </div>
                </div>
                
                <div class="sandbox-workspace-wrapper">
                    <h4 class="sandbox-subtitle" data-en="Your Code Stack" data-ar="مجموعة الأوامر الخاصة بك"></h4>
                    <div class="sandbox-workspace" id="sandbox-workspace">
                        <div class="workspace-empty" data-en="Click on the blocks above to build your program!" data-ar="اضغط على الأوامر البرمجية في الأعلى لبناء برنامجك هنا!"></div>
                    </div>
                </div>
                
                <div class="sandbox-controls">
                    <button class="control-btn control-btn--flag" id="btn-run-sandbox">
                        <span class="s-icon">🟢</span>
                        <span data-en="Run Stack" data-ar="تشغيل الأوامر"></span>
                    </button>
                    <button class="control-btn control-btn--clear" id="btn-clear-sandbox">
                        <span class="s-icon">🗑️</span>
                        <span data-en="Clear All" data-ar="مسح الكل"></span>
                    </button>
                </div>
            </div>
        </div>
        
        <!-- Stage Panel -->
        <div class="sandbox-stage-panel">
            <div class="sandbox-stage-header">
                <span class="stage-badge" data-en="STAGE" data-ar="منصة العرض"></span>
                <span class="stage-coords" id="sandbox-coords">X: 0, Y: 0</span>
            </div>
            
            <div class="sandbox-stage" id="sandbox-stage">
                <!-- Grid coordinates lines -->
                <div class="sandbox-grid-lines" id="sandbox-grid-lines"></div>
                
                <!-- Speech bubble for mascot -->
                <div class="sandbox-bubble" id="sandbox-bubble" data-en="Hello!" data-ar="مرحباً!">Hello!</div>
                
                <!-- Mascot (Scratch Cat SVG) -->
                <div class="sandbox-mascot" id="sandbox-mascot" style="transform: translate(0px, 0px) rotate(0deg) scaleX(1);">
                    <svg class="cat-svg" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">

                        <polygon points="77,28 68,18 64,29" fill="#FFB366"/>

                        <ellipse cx="57" cy="58" rx="8" ry="6" fill="#FFFFFF"/>
                        <!-- Eyes -->
                        <ellipse cx="38" cy="42" rx="7" ry="9" fill="#FFFFFF"/>
                        <ellipse cx="62" cy="42" rx="7" ry="9" fill="#FFFFFF"/>
                        <ellipse cx="38" cy="42" rx="3" ry="5" fill="#000000"/>
                        <ellipse cx="62" cy="42" rx="3" ry="5" fill="#000000"/>
                        <!-- Nose -->
                        <polygon points="47,51 53,51 50,55" fill="#FF3300"/>
                        <!-- Mouth -->
                        <path d="M43,58 Q50,65 57,58" stroke="#000000" stroke-width="2.5" fill="none"/>
                        <!-- Whiskers -->
                        <line x1="12" y1="52" x2="28" y2="54" stroke="#000000" stroke-width="1.5" stroke-linecap="round"/>
                        <line x1="10" y1="58" x2="28" y2="58" stroke="#000000" stroke-width="1.5" stroke-linecap="round"/>
                        <line x1="12" y1="64" x2="28" y2="62" stroke="#000000" stroke-width="1.5" stroke-linecap="round"/>
                        <line x1="88" y1="52" x2="72" y2="54" stroke="#000000" stroke-width="1.5" stroke-linecap="round"/>
                        <line x1="90" y1="58" x2="72" y2="58" stroke="#000000" stroke-width="1.5" stroke-linecap="round"/>
                        <line x1="88" y1="64" x2="72" y2="62" stroke="#000000" stroke-width="1.5" stroke-linecap="round"/>
                    </svg>
                </div>
            </div>
            
            <div class="sandbox-stage-footer">
                <button class="stage-control-btn" id="btn-toggle-grid" data-en="Show Grid" data-ar="شبكة الإحداثيات">Show Grid</button>
                <button class="stage-control-btn" id="btn-reset-mascot" data-en="Reset Mascot" data-ar="إعادة الضبط">Reset Mascot</button>
            </div>
        </div>
    </div>
</section>

            <p class="outcome-card__desc" data-en="Create fully functional games from scratch with animations, scoring, and levels." data-ar="إنشاء ألعاب كاملة من الصفر مع الرسوم المتحركة والنتائج والمستويات."></p>

                <svg viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 4a8 8 0 0 0-8 8c0 3 2 5 4 7v5h8v-5c2-2 4-4 4-7a8 8 0 0 0-8-8z"/><path d="M12 28h8"/><path d="M14 20h4"/></svg>

<footer class="footer" id="footer-section">
    <div class="footer__inner">
        <div class="footer__brand-row">
            <img src="./2.jpg" alt="ACWAD Logo Icon" class="footer__logo-icon">
            <div class="footer__brand-text">
                <div class="brand-title-row">
                    <span class="brand-en">ACWAD</span>
                    <span class="brand-ar">أكواد</span>
                </div>
                <span class="footer__brand-sub">BUILD YOUR FUTURE</span>
            </div>
        </div>
        <p class="footer__text" data-en="ACWAD — Empowering the Next Generation of Creators" data-ar="أكواد — تمكين الجيل القادم من المبدعين"></p>
        <div class="footer__line"></div>
    </div>
</footer>

<script>
// ══════════════════════ LANGUAGE SWITCHER ══════════════════════
let currentLang = 'en';

function setLang(lang) {
    currentLang = lang;
    const html = document.documentElement;
    html.setAttribute('lang', lang);
    html.setAttribute('dir', lang === 'ar' ? 'rtl' : 'ltr');

    // Toggle active button
    document.getElementById('btn-en').classList.toggle('lang-btn--active', lang === 'en');
    document.getElementById('btn-ar').classList.toggle('lang-btn--active', lang === 'ar');

    // Swap all [data-en] / [data-ar] elements
    document.querySelectorAll('[data-en][data-ar]').forEach(el => {
        el.textContent = el.getAttribute('data-' + lang);
    });

    // Update page title
    if (lang === 'ar') {
        document.title = 'خريطة طريق برمجة سكراتش — أكاديمية ACWAD';
    } else {
        document.title = 'Scratch Programming Roadmap — ACWAD Academy';
    }

    // Save preference
    localStorage.setItem('acwad-lang', lang);

    // Dynamic translate the sandbox stack if running or populated
    updateSandboxTranslation();
}

// ══════════════════════ SCROLL PROGRESS BAR ══════════════════════
window.addEventListener('scroll', () => {
    const bar = document.getElementById('scroll-progress-bar');
    if (bar) {
        const scrolled = (window.scrollY / (document.documentElement.scrollHeight - window.innerHeight)) * 100;
        bar.style.width = scrolled + '%';
    }
});

// ══════════════════════ SCROLL REVEAL OBSERVER ══════════════════════
const revealObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
        if (entry.isIntersecting) {
            entry.target.classList.add('reveal--visible');
        }
    });
}, {
    threshold: 0.1,
    rootMargin: '0px 0px -40px 0px'
});

document.querySelectorAll('.reveal, .reveal-scale').forEach(el => {
    revealObserver.observe(el);
});

// ══════════════════════ ACTIVE TIMELINE OBSERVER ══════════════════════
const levelObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
        if (entry.isIntersecting) {
            // Remove active from all levels
            document.querySelectorAll('.level').forEach(el => el.classList.remove('level--active'));
            // Add active to current level
            entry.target.classList.add('level--active');
        }
    });
}, {
    threshold: 0.5
});

document.querySelectorAll('.level').forEach(el => {
    levelObserver.observe(el);
});

// ══════════════════════ HOVER TILT AND SPOTLIGHT GLOW ══════════════════════
document.querySelectorAll('.info-card, .what-card, .why-card, .lesson-card, .outcome-card, .game-card').forEach(card => {
    // Append spotlight overlay
    const overlay = document.createElement('div');
    overlay.className = 'spotlight-overlay';
    if (card.classList.contains('game-card') || card.classList.contains('level__badge')) {
        overlay.classList.add('spotlight-overlay--white');
    }
    card.style.position = 'relative';
    card.appendChild(overlay);

    card.addEventListener('mousemove', (e) => {
        const rect = card.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        
        const px = (x / rect.width) - 0.5;
        const py = (y / rect.height) - 0.5;
        
        card.style.setProperty('--rx', (-py * 12) + 'deg');
        card.style.setProperty('--ry', (px * 12) + 'deg');
        card.style.setProperty('--mx', (x / rect.width) * 100 + '%');
        card.style.setProperty('--my', (y / rect.height) * 100 + '%');
        
        card.classList.add('tilt-hover');
    });

    card.addEventListener('mouseleave', () => {
        card.classList.remove('tilt-hover');
        card.style.setProperty('--rx', '0deg');
        card.style.setProperty('--ry', '0deg');
    });
});

// ══════════════════════ HERO PARTICLES STARFIELD ══════════════════════
const canvas = document.getElementById('hero-canvas');
if (canvas) {
    const ctx = canvas.getContext('2d');
    let particles = [];
    const symbols = ['{ }', '[ ]', '< >', 'JS', 'Scratch', '1', '0', '+', '=', 'if', 'loop'];
    const colors = ['rgba(13, 71, 161, 0.45)', 'rgba(245, 180, 0, 0.45)', 'rgba(76, 151, 255, 0.45)', 'rgba(153, 102, 255, 0.45)'];
    
    let mouseX = null;
    let mouseY = null;
    
    const hero = document.getElementById('hero-section');
    if (hero) {
        hero.addEventListener('mousemove', (e) => {
            const rect = hero.getBoundingClientRect();
            mouseX = e.clientX - rect.left;
            mouseY = e.clientY - rect.top;
        });
        
        hero.addEventListener('mouseleave', () => {
            mouseX = null;
            mouseY = null;
        });
    }
    
    function resizeCanvas() {
        canvas.width = canvas.parentElement.offsetWidth;
        canvas.height = canvas.parentElement.offsetHeight;
    }
    
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);
    
    class Particle {
        constructor() {
            this.reset();
            this.y = Math.random() * canvas.height;
        }
        
        reset() {
            this.x = Math.random() * canvas.width;
            this.y = -20;
            this.text = symbols[Math.floor(Math.random() * symbols.length)];
            this.color = colors[Math.floor(Math.random() * colors.length)];
            this.size = Math.random() * 16 + 12;
            this.vx = Math.random() * 0.8 - 0.4;
            this.vy = Math.random() * 0.5 + 0.2;
            this.alpha = Math.random() * 0.5 + 0.3;
        }
        
        update() {
            this.x += this.vx;
            this.y += this.vy;
            
            // Mouse repel
            if (mouseX !== null && mouseY !== null) {
                const dx = this.x - mouseX;
                const dy = this.y - mouseY;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < 120) {
                    const force = (120 - dist) / 120;
                    const angle = Math.atan2(dy, dx);
                    this.x += Math.cos(angle) * force * 5;
                    this.y += Math.sin(angle) * force * 5;
                }
            }
            
            if (this.y > canvas.height + 20 || this.x < -20 || this.x > canvas.width + 20) {
                this.reset();
            }
        }
        
        draw() {
            ctx.fillStyle = this.color;
            ctx.font = `bold ${this.size}px 'Outfit', sans-serif`;
            ctx.fillText(this.text, this.x, this.y);
        }
    }
    
    // Initialize particles
    const particleCount = 28;
    for (let i = 0; i < particleCount; i++) {
        particles.push(new Particle());
    }
    
    function animateParticles() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Draw connection lines
        for (let i = 0; i < particles.length; i++) {
            for (let j = i + 1; j < particles.length; j++) {
                const dx = particles[i].x - particles[j].x;
                const dy = particles[i].y - particles[j].y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                
                if (dist < 110) {
                    ctx.beginPath();
                    ctx.moveTo(particles[i].x, particles[i].y - 5);
                    ctx.lineTo(particles[j].x, particles[j].y - 5);
                    ctx.strokeStyle = `rgba(13, 71, 161, ${0.1 * (1 - dist / 110)})`;
                    ctx.lineWidth = 1;
                    ctx.stroke();
                }
            }
        }
        
        particles.forEach(p => {
            p.update();
            p.draw();
        });
        
        requestAnimationFrame(animateParticles);
    }
    
    animateParticles();
}

// ══════════════════════ INTERACTIVE SANDBOX PLAYGROUND ══════════════════════
const sandboxWorkspace = document.getElementById('sandbox-workspace');
const mascot = document.getElementById('sandbox-mascot');
const bubble = document.getElementById('sandbox-bubble');
const coordsText = document.getElementById('sandbox-coords');
const gridLines = document.getElementById('sandbox-grid-lines');

let mascotX = 0;
let mascotY = 0;
let mascotRot = 0;
let mascotScaleX = 1;

let isSandboxRunning = false;

// Audio context initializer helper
let audioCtx = null;
function getAudioCtx() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === 'suspended') {
        audioCtx.resume();
    }
    return audioCtx;
}

// Synthesized meow sound using pure Web Audio API oscillators and gains
function playSynthesizedMeow() {
    try {
        const ctx = getAudioCtx();
        const osc = ctx.createOscillator();
        const gainNode = ctx.createGain();

        osc.connect(gainNode);
        gainNode.connect(ctx.destination);

        const now = ctx.currentTime;

        // Meow frequency sweep: start low, rise quickly, slide down slightly
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(320, now);
        osc.frequency.exponentialRampToValueAtTime(750, now + 0.12);
        osc.frequency.exponentialRampToValueAtTime(420, now + 0.38);

        // Volume envelope: rapid attack, smooth decay
        gainNode.gain.setValueAtTime(0, now);
        gainNode.gain.linearRampToValueAtTime(0.35, now + 0.04);
        gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.45);

        osc.start(now);
        osc.stop(now + 0.48);
    } catch (e) {
        console.error('Web Audio API meow failed:', e);
    }
}

// Coordinate sync helper
function updateMascotTransform() {
    mascot.style.transform = `translate(calc(-50% + ${mascotX}px), calc(-50% + ${mascotY}px)) rotate(${mascotRot}deg) scaleX(${mascotScaleX})`;
    // Position bubble above the mascot
    bubble.style.left = `calc(50% + ${mascotX}px)`;
    bubble.style.top = `calc(50% + ${mascotY - 70}px)`;
    // Update live coordinates in stage header (invert Y to match standard Cartesian coordinates)
    coordsText.textContent = `X: ${mascotX}, Y: ${-mascotY}`;
}

// Reset Mascot state
function resetMascot() {
    mascotX = 0;
    mascotY = 0;
    mascotRot = 0;
    mascotScaleX = 1;
    updateMascotTransform();
    bubble.classList.remove('sandbox-bubble--visible');
}

document.getElementById('btn-reset-mascot').addEventListener('click', resetMascot);

// Grid toggle
document.getElementById('btn-toggle-grid').addEventListener('click', (e) => {
    gridLines.classList.toggle('sandbox-grid-lines--visible');
    e.target.classList.toggle('stage-control-btn--active');
});

// Click blocks to add to Workspace Stack
document.querySelectorAll('.scratch-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        const action = btn.getAttribute('data-action');
        const labelEn = btn.getAttribute('data-en');
        const labelAr = btn.getAttribute('data-ar');
        addBlockToWorkspace(action, labelEn, labelAr);
    });
});

function addBlockToWorkspace(action, labelEn, labelAr) {
    if (isSandboxRunning) return;
    
    // Hide empty helper text
    const emptyHelper = sandboxWorkspace.querySelector('.workspace-empty');
    if (emptyHelper) {
        emptyHelper.style.display = 'none';
    }

    // Determine category block styling class
    let categoryClass = 'motion';
    if (action === 'say') categoryClass = 'looks';
    if (action === 'sound') categoryClass = 'sound';

    // Limit stack size to 8 blocks for neat UI
    const existingCount = sandboxWorkspace.querySelectorAll('.workspace-block').length;
    if (existingCount >= 8) {
        alert(currentLang === 'ar' ? 'أقصى عدد للأوامر المسموح بها في نفس الوقت هو 8!' : 'Maximum 8 programming blocks allowed in stack!');
        return;
    }

    const block = document.createElement('div');
    block.className = `workspace-block workspace-block--${categoryClass}`;
    block.setAttribute('data-action', action);
    block.setAttribute('data-en', labelEn);
    block.setAttribute('data-ar', labelAr);

    // Label span
    const labelSpan = document.createElement('span');
    labelSpan.className = 'block-label';
    labelSpan.setAttribute('data-en', labelEn);
    labelSpan.setAttribute('data-ar', labelAr);
    labelSpan.textContent = currentLang === 'ar' ? labelAr : labelEn;

    // Delete button
    const delBtn = document.createElement('button');
    delBtn.className = 'workspace-block__delete';
    delBtn.innerHTML = '&times;';
    delBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        if (isSandboxRunning) return;
        block.remove();
        checkWorkspaceEmpty();
    });

    block.appendChild(labelSpan);
    block.appendChild(delBtn);
    sandboxWorkspace.appendChild(block);
}

function checkWorkspaceEmpty() {
    const blocks = sandboxWorkspace.querySelectorAll('.workspace-block');
    if (blocks.length === 0) {
        const emptyHelper = sandboxWorkspace.querySelector('.workspace-empty');
        if (emptyHelper) {
            emptyHelper.style.display = 'flex';
        }
    }
}

// Clear all blocks in stack
document.getElementById('btn-clear-sandbox').addEventListener('click', () => {
    if (isSandboxRunning) return;
    sandboxWorkspace.querySelectorAll('.workspace-block').forEach(b => b.remove());
    checkWorkspaceEmpty();
    resetMascot();
});

// Update block translations dynamically
function updateSandboxTranslation() {
    sandboxWorkspace.querySelectorAll('.workspace-block .block-label').forEach(el => {
        el.textContent = el.getAttribute('data-' + currentLang);
    });
}

// Green Flag Sequence Runner
document.getElementById('btn-run-sandbox').addEventListener('click', async () => {
    if (isSandboxRunning) return;
    
    // Trigger audio resume for browser user-interaction rules
    getAudioCtx();

    const blocks = sandboxWorkspace.querySelectorAll('.workspace-block');
    if (blocks.length === 0) {
        alert(currentLang === 'ar' ? 'المجموعة فارغة! أضف بعض الأوامر البرمجية أولاً بالضغط عليها.' : 'Stack is empty! Add some blocks to run them.');
        return;
    }

    isSandboxRunning = true;
    document.getElementById('btn-run-sandbox').style.opacity = '0.6';

    for (let i = 0; i < blocks.length; i++) {
        const block = blocks[i];
        
        // Highlight current running block
        block.classList.add('workspace-block--running');
        
        const action = block.getAttribute('data-action');
        
        // Execute block logic
        await executeBlockAction(action);
        
        // Pause 800ms between blocks for animation timing
        await new Promise(resolve => setTimeout(resolve, 800));
        
        block.classList.remove('workspace-block--running');
    }

    isSandboxRunning = false;
    document.getElementById('btn-run-sandbox').style.opacity = '1';
});

function executeBlockAction(action) {
    return new Promise(resolve => {
        if (action === 'move') {
            // Forward step based on current text direction/language
            // In English LTR: forward is right (+35). In Arabic RTL: forward is left (-35)
            const step = currentLang === 'ar' ? -35 : 35;
            mascotX += step;
            
            // Boundary checks with automatic mascot flipping
            if (mascotX > 140) {
                mascotX = 140;
                mascotScaleX = -1; // face left
            } else if (mascotX < -140) {
                mascotX = -140;
                mascotScaleX = 1; // face right
            }
            updateMascotTransform();
            resolve();
        } else if (action === 'turn') {
            mascotRot += 45;
            updateMascotTransform();
            resolve();
        } else if (action === 'say') {
            bubble.textContent = currentLang === 'ar' ? 'مرحباً!' : 'Hello!';
            bubble.classList.add('sandbox-bubble--visible');
            setTimeout(() => {
                bubble.classList.remove('sandbox-bubble--visible');
            }, 1800);
            resolve();
        } else if (action === 'sound') {
            playSynthesizedMeow();
            // Jiggle cat mascot upward on meow sound
            const origY = mascotY;
            mascotY -= 15;
            updateMascotTransform();
            setTimeout(() => {
                mascotY = origY;
                updateMascotTransform();
            }, 300);
            resolve();
        }
    });
}

// Initialize saved language
(function() {
    const saved = localStorage.getItem('acwad-lang');
    if (saved) {
        setLang(saved);
    } else {
        setLang('en');
    }
    // Initialize mascot and bubble position
    resetMascot();
})();
</script>
